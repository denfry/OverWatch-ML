name: Bug Report
description: Create a report to help us improve OverWatch-ML
labels: ["bug"]
body:
  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      description: What version of OverWatch-ML are you running?
      placeholder: e.g. 2.0.0
    validations:
      required: true
  - type: input
    id: server-version
    attributes:
      label: Server Version
      description: What server software and version are you running?
      placeholder: e.g. Paper 1.21
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console Output
      description: Paste any relevant error logs or stack traces here.
      render: shell
    validations:
      required: false
