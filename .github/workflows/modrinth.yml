name: Upload to Modrinth

on:
  push:
    branches:
      - main
      - dev

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload to Modrinth
        uses: modrinth-action/upload@v1
        with:
          token: ${{ secrets.MODRINTH_API_TOKEN }}
          file-path: target/OverWatch-ML-*.jar
          game-versions: |
            1.21
            1.21.1
            1.21.2
            1.21.3
            1.21.4
          loaders: |
            paper
          version-type: release
          featured: false
          dependencies: |
            [{"project_id":"ProtocolLib","version_type":"required"}]
