name: Upload to Modrinth

on:
  push:
    branches:
      - main
      - dev

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Upload to Modrinth
        uses: modrinth-action/upload@v1
        with:
          token: ${{ secrets.MODRINTH_API_TOKEN }}
          file: target/*.jar
          game_versions: ["1.21.*"]
          loaders: ["paper"]
          version_type: release
          dependencies: '[{"project_id":"ProtocolLib","version_type":"required"}]'