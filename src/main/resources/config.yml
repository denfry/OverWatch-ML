# OverWatch-ML Configuration File

# Debug mode - enables verbose logging
debug:
  enabled: false

# Auto-update settings
check-for-updates: false
notify-admins-on-join: true
modrinth-id: ""

# Periodic update checking configuration
periodic-update-checks:
  enabled: true
  interval-hours: 24

# Auto-updates settings
auto-updates:
  enabled: true

# ============= ANTI-XRAY SYSTEM =============

# Decoy ore system - places fake ores to catch xrayers
decoy:
  enabled: true
  oreThreshold: 10
  timeWindowTicks: 3600
  distance: 5.0
  fieldOffset: 0.5
  requireBuried: true
  warnOnDecoy: false
  revertDelay: 1200
  maxDistance: 10.0
  searchRadius: 10
  buriedThreshold: 6

# Staff alerts for ore mining
staff:
  oreAlerts: true
  oreResetTime: 36000
  alertEnabled: true

# Natural ores that trigger anti-xray
ores:
  natural:
    - DIAMOND_ORE
    - DEEPSLATE_DIAMOND_ORE
    - GOLD_ORE
    - DEEPSLATE_GOLD_ORE
    - EMERALD_ORE
    - DEEPSLATE_EMERALD_ORE

# ============= PUNISHMENT SYSTEM =============

# Enable/disable automatic punishments per level
# Set to false to disable punishment for that level
# Level 0 = no action, Level 1-6 = escalating punishments
punishment:
  enabled:
    1: false
    2: false
    3: false
    4: false
    5: false
    6: false

  autoSave:
    enabled: true
    intervalMinutes: 10
    logging: true

# ============= MACHINE LEARNING DETECTION =============

# ML-based detection system
ml:
  enabled: true
  # Flag-only mode: when true, only notifies staff but does NOT apply punishments
  flag-only: true
  trainingSessionDuration: 600
  detectionThreshold: 0.75
  positionUpdateInterval: 20
  min-data-points: 50

  thresholds:
    warning: 60
    auto-punish: 90

  autoAnalysis:
    enabled: true
    suspiciousThreshold: 15
    maxPlayers: 5

  # Bot training system (for development/testing)
  bots:
    autoTraining: false
    maxConcurrentBots: 5
    trainingSessionDuration: 120
    spawnInterval: 30

# Automation settings
automation:
  auto-punish:
    enabled: false
    type: "KICK"

# Performance settings
performance:
  analysis-interval: 100
  max-queue: 20

# World-specific settings
disabled-worlds:
  enabled: false
  worlds: []

# Storage settings
storage:
  type: yaml

# Language settings
language: en

# ============= INTEGRATIONS =============

# Discord integration
integrations:
  discord:
    enabled: false
    bot-token: "YOUR_BOT_TOKEN_HERE"
    notification-channel: "123456789012345678"
    command-channel: "123456789012345678"
    alert-level: "HIGH"

  anticheat:
    enabled: true
    aac:
      enabled: true
    nocheatplus:
      enabled: true

# Webhook integration
webhook:
  url: ""
  alerts:
    xray_detection: true
    suspicious_mining: true
    punishment_applied: true
    staff_actions: false
    appeal_updates: true

# Composite punishment system
composite-punishments:
  enabled: true
  escalation-enabled: true
  max-level: 6

# ============= DATA MANAGEMENT =============

# Stats auto-save settings
stats:
  autoSave:
    enabled: true
    intervalMinutes: 10
    logging: false

# Suspicious players auto-save settings
suspicious:
  autoSave:
    enabled: true
    intervalMinutes: 10
    logging: true

# Command hiding - shows "Unknown command" instead of "No permission"
command-hiding:
  enabled: false
  messages:
    error-line1: "§cUnknown or incomplete command, see below for error"
    error-line2: "§c§n{command}§r§c§o<--[HERE]"
